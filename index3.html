<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英単語トレーナー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --card: #22222e;
    --accent: #7fffb2;
    --accent2: #ff7f9e;
    --accent3: #7fb8ff;
    --text: #e8e8f0;
    --muted: #666680;
    --border: #33334a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  header {
    width: 100%; max-width: 600px;
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .title { font-family:'Space Mono',monospace; font-size:14px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; }
  .progress-info { font-size:12px; color:var(--muted); font-family:'Space Mono',monospace; }

  .progress-bar { width:100%; max-width:600px; height:3px; background:var(--border); border-radius:2px; margin-bottom:28px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent3)); border-radius:2px; transition:width 0.5s ease; }

  .steps { display:flex; gap:8px; margin-bottom:28px; width:100%; max-width:600px; }
  .step { flex:1; padding:8px 12px; border-radius:6px; font-size:11px; font-family:'Space Mono',monospace; text-align:center; border:1px solid var(--border); color:var(--muted); transition:all 0.3s; }
  .step.active { border-color:var(--accent); color:var(--accent); background:rgba(127,255,178,0.06); }
  .step.done { border-color:var(--border); color:var(--muted); background:rgba(127,255,178,0.03); text-decoration:line-through; }

  .card { width:100%; max-width:600px; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:40px 36px; position:relative; overflow:hidden; }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2)); }

  .word-number { font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:24px; letter-spacing:1px; }

  /* Play button */
  .speak-btn {
    width:100%; padding:28px;
    background:rgba(127,255,178,0.05);
    border:2px solid var(--accent); border-radius:12px;
    color:var(--accent); font-size:40px;
    cursor:pointer; transition:all 0.2s;
    display:flex; flex-direction:column; align-items:center; gap:10px;
  }
  .speak-btn:hover { background:rgba(127,255,178,0.12); }
  .speak-btn .label { font-size:12px; font-family:'Space Mono',monospace; letter-spacing:2px; color:var(--accent); }
  .speak-btn.playing { animation:pulse-green 0.8s ease-in-out infinite alternate; }
  @keyframes pulse-green {
    from { border-color:var(--accent); box-shadow:0 0 0 0 rgba(127,255,178,0.3); }
    to   { border-color:var(--accent3); box-shadow:0 0 20px 4px rgba(127,184,255,0.2); }
  }

  /* Mic button */
  .mic-area { display:flex; flex-direction:column; align-items:center; gap:14px; margin:8px 0 18px; }
  .mic-btn {
    width:96px; height:96px; border-radius:50%;
    border:3px solid var(--accent2);
    background:rgba(255,127,158,0.06);
    color:var(--accent2); font-size:36px;
    cursor:pointer; transition:all 0.2s;
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .mic-btn:hover { background:rgba(255,127,158,0.14); }
  .mic-btn.listening {
    border-color:var(--accent2);
    background:rgba(255,127,158,0.18);
    animation:pulse-red 0.7s ease-in-out infinite alternate;
  }
  @keyframes pulse-red {
    from { box-shadow:0 0 0 0 rgba(255,127,158,0.5); }
    to   { box-shadow:0 0 0 20px rgba(255,127,158,0); }
  }
  .mic-btn.listening::after {
    content:''; position:absolute; inset:-10px; border-radius:50%;
    border:2px solid rgba(255,127,158,0.3);
    animation:ripple 1s ease-out infinite;
  }
  @keyframes ripple { from{transform:scale(1);opacity:1;} to{transform:scale(1.6);opacity:0;} }

  .mic-status { font-family:'Space Mono',monospace; font-size:12px; color:var(--muted); letter-spacing:1px; text-align:center; min-height:18px; }
  .mic-status.active { color:var(--accent2); }

  .heard-text {
    width:100%; min-height:52px;
    background:var(--surface); border:1.5px solid var(--border); border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:20px; color:var(--text); letter-spacing:1px;
    padding:12px 18px; text-align:center; transition:border-color 0.3s;
  }
  .heard-text.correct { border-color:var(--accent); color:var(--accent); }
  .heard-text.wrong   { border-color:var(--accent2); color:var(--accent2); }
  .heard-text.empty   { color:var(--muted); font-size:13px; }

  .feedback { display:none; padding:14px 18px; border-radius:8px; font-size:14px; margin-bottom:12px; align-items:flex-start; gap:10px; }
  .feedback.show { display:flex; }
  .feedback.ok { background:rgba(127,255,178,0.08); border:1px solid var(--accent); color:var(--accent); }
  .feedback.ng { background:rgba(255,127,158,0.08); border:1px solid var(--accent2); color:var(--accent2); }
  .feedback-icon { font-size:20px; flex-shrink:0; }
  .feedback-text { line-height:1.6; }
  .correct-answer { font-family:'Space Mono',monospace; font-weight:700; font-size:16px; }

  .question-label { font-size:13px; color:var(--muted); margin-bottom:10px; letter-spacing:0.5px; }
  .replaying-hint { font-size:11px; color:var(--accent3); margin-bottom:16px; font-family:'Space Mono',monospace; cursor:pointer; display:inline-flex; align-items:center; gap:6px; opacity:0.8; }
  .replaying-hint:hover { opacity:1; }

  .btn-row { display:flex; gap:10px; margin-top:12px; }
  .btn { flex:1; padding:14px; border-radius:8px; border:none; font-family:'Noto Sans JP',sans-serif; font-size:14px; cursor:pointer; transition:all 0.2s; letter-spacing:0.5px; }
  .btn-primary { background:var(--accent); color:#0f0f14; font-weight:700; }
  .btn-primary:hover { filter:brightness(1.1); transform:translateY(-1px); }
  .btn-primary:disabled { opacity:0.35; cursor:not-allowed; transform:none; filter:none; }
  .btn-secondary { background:transparent; color:var(--muted); border:1px solid var(--border); }
  .btn-secondary:hover { color:var(--text); border-color:var(--muted); }

  /* Result */
  #result-screen { display:none; width:100%; max-width:600px; text-align:center; }
  .result-big { font-size:64px; font-family:'Space Mono',monospace; font-weight:700; background:linear-gradient(135deg,var(--accent),var(--accent3)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:8px; }
  .result-label { font-size:14px; color:var(--muted); margin-bottom:32px; }
  .missed-list { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:24px; text-align:left; }
  .missed-title { font-size:11px; font-family:'Space Mono',monospace; color:var(--accent2); letter-spacing:2px; margin-bottom:14px; }
  .missed-item { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:14px; }
  .missed-item:last-child { border-bottom:none; }
  .missed-en { font-family:'Space Mono',monospace; color:var(--accent3); }
  .missed-ja { color:var(--muted); }

  /* Set selector */
  #set-screen { width:100%; max-width:600px; text-align:center; }
  .set-title { font-family:'Space Mono',monospace; font-size:22px; color:var(--accent); margin-bottom:8px; letter-spacing:2px; }
  .set-sub { font-size:13px; color:var(--muted); margin-bottom:32px; }
  .set-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
  .set-btn { padding:16px 10px; background:var(--card); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:'Space Mono',monospace; font-size:11px; cursor:pointer; transition:all 0.2s; line-height:1.6; letter-spacing:1px; }
  .set-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(127,255,178,0.06); }
  .set-btn.selected { border-color:var(--accent); color:var(--accent); background:rgba(127,255,178,0.1); }
  .set-btn .count { display:block; color:var(--muted); font-size:10px; margin-top:4px; }
  .all-btn { width:100%; padding:16px; background:transparent; border:1px solid var(--border); border-radius:10px; color:var(--muted); font-family:'Space Mono',monospace; font-size:11px; cursor:pointer; transition:all 0.2s; margin-bottom:20px; letter-spacing:1px; }
  .all-btn:hover { border-color:var(--accent3); color:var(--accent3); }

  .fade-in { animation:fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }

  /* モード切り替え */
  .mode-toggle { display:flex; gap:8px; margin-bottom:16px; }
  .mode-btn { flex:1; padding:10px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); font-family:'Noto Sans JP',sans-serif; font-size:13px; cursor:pointer; transition:all 0.2s; }
  .mode-btn.active { border-color:var(--accent3); color:var(--accent3); background:rgba(127,184,255,0.08); }

  /* タイピング入力 */
  .answer-input { width:100%; padding:18px 20px; background:var(--surface); border:1.5px solid var(--border); border-radius:10px; color:var(--text); font-size:22px; font-family:'Noto Sans JP',sans-serif; outline:none; transition:border-color 0.2s; margin-bottom:16px; }
  .answer-input:focus { border-color:var(--accent3); }
  .answer-input.correct { border-color:var(--accent); background:rgba(127,255,178,0.04); }
  .answer-input.wrong { border-color:var(--accent2); background:rgba(255,127,158,0.04); }
</style>
</head>
<body>

<!-- SET SELECT -->
<div id="set-screen" class="fade-in">
  <div style="margin:20px 0 40px;">
    <div class="set-title">VOCAB TRAINER</div>
    <div class="set-sub">🎤 音声で答える単語練習アプリ</div>
  </div>
  <div class="set-grid" id="set-grid"></div>
  <button class="all-btn" onclick="startAll()">🗂 全単語まとめて練習</button>
  <button class="btn btn-primary" id="start-btn" onclick="startSelected()" style="width:100%;padding:16px;font-size:15px;" disabled>スタート →</button>
</div>

<!-- QUIZ -->
<div id="quiz-screen" style="display:none;width:100%;max-width:600px;">
  <header>
    <span class="title">VOCAB TRAINER</span>
    <span class="progress-info" id="progress-info">0 / 0</span>
  </header>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="steps">
    <div class="step active" id="s1">① 音声</div>
    <div class="step" id="s2">② 日本語訳</div>
    <div class="step" id="s3">③ スペル</div>
  </div>

  <div class="card fade-in" id="quiz-card">
    <div class="word-number" id="word-num">単語 1</div>

    <!-- STEP 1 -->
    <div id="step1">
      <div style="font-size:13px;color:var(--muted);margin-bottom:20px;">音声を聞いて、単語を確認しよう</div>
      <button class="speak-btn" id="speak-btn" onclick="playAudio()">
        <span>🔊</span>
        <span class="label">TAP TO LISTEN</span>
      </button>
      <div class="btn-row" style="margin-top:20px;">
        <button class="btn btn-primary" id="next-to-step2" onclick="goStep2()" disabled>日本語訳を答える →</button>
      </div>
    </div>

    <!-- STEP 2 -->
    <div id="step2" style="display:none">
      <div class="question-label">この単語の <strong>日本語訳</strong> を答えよう</div>
      <div class="replaying-hint" onclick="playAudio()">🔊 もう一度聞く</div>
      <!-- 切り替えタブ -->
      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-jp-voice" onclick="setMode('jp','voice')">🎤 音声</button>
        <button class="mode-btn" id="mode-jp-type" onclick="setMode('jp','type')">⌨️ タイピング</button>
      </div>
      <!-- 音声UI -->
      <div id="jp-voice-ui">
        <div class="mic-area">
          <button class="mic-btn" id="mic-jp" onclick="startListen('jp')">🎤</button>
          <div class="mic-status" id="mic-status-jp">タップして話す（日本語）</div>
        </div>
        <div class="heard-text empty" id="heard-jp">ここに聞き取った言葉が表示されます</div>
      </div>
      <!-- タイピングUI -->
      <div id="jp-type-ui" style="display:none">
        <input class="answer-input" id="jp-input" type="text" placeholder="日本語で入力…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
          onkeydown="if(event.key==='Enter')checkJp()">
      </div>
      <div class="feedback" id="jp-feedback"><span class="feedback-icon"></span><div class="feedback-text"></div></div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="skipStep('jp')">わからない</button>
        <button class="btn btn-primary" id="jp-check-btn" onclick="checkJp()" disabled>答え合わせ</button>
      </div>
    </div>

    <!-- STEP 3 -->
    <div id="step3" style="display:none">
      <div class="question-label" id="step3-label">スペルを答えよう</div>
      <div class="replaying-hint" onclick="playAudio()">🔊 英語音声を聞く</div>
      <!-- 切り替えタブ -->
      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-sp-voice" onclick="setMode('sp','voice')">🎤 音声</button>
        <button class="mode-btn" id="mode-sp-type" onclick="setMode('sp','type')">⌨️ タイピング</button>
      </div>
      <!-- 音声UI -->
      <div id="sp-voice-ui">
        <div class="mic-area">
          <button class="mic-btn" id="mic-sp" onclick="startListen('sp')">🎤</button>
          <div class="mic-status" id="mic-status-sp">タップして1文字ずつ言う</div>
        </div>
        <div class="heard-text empty" id="heard-sp">ここに聞き取った言葉が表示されます</div>
      </div>
      <!-- タイピングUI -->
      <div id="sp-type-ui" style="display:none">
        <input class="answer-input" id="sp-input" type="text" placeholder="英語でスペルを入力…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
          onkeydown="if(event.key==='Enter')checkSpell()">
      </div>
      <div class="feedback" id="sp-feedback"><span class="feedback-icon"></span><div class="feedback-text"></div></div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="skipStep('sp')">わからない</button>
        <button class="btn btn-primary" id="sp-check-btn" onclick="checkSpell()" disabled>答え合わせ</button>
      </div>
    </div>

    <!-- NEXT -->
    <div id="step-next" style="display:none;margin-top:16px;">
      <button class="btn btn-primary" style="width:100%;" onclick="nextWord()">次の単語 →</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result-screen">
  <div style="margin:32px 0 16px;">
    <div class="result-big" id="result-score">0/0</div>
    <div class="result-label">スペル正解</div>
  </div>
  <div class="missed-list" id="missed-list" style="display:none">
    <div class="missed-title">MISSED WORDS</div>
    <div id="missed-items"></div>
  </div>
  <div class="btn-row" style="max-width:600px;margin:0 auto;">
    <button class="btn btn-secondary" style="flex:1;" onclick="backToMenu()">セット選択に戻る</button>
    <button class="btn btn-primary" style="flex:1;" onclick="retryMissed()" id="retry-btn">間違いを再練習</button>
  </div>
</div>

<script>
// ── Word data ──
const ALL_WORDS = [
  {en:"teacher",ja:"先生"},{en:"brother",ja:"兄弟"},{en:"father",ja:"父"},
  {en:"animal",ja:"動物"},{en:"classroom",ja:"教室"},{en:"chair",ja:"いす"},
  {en:"flower",ja:"花"},{en:"bird",ja:"鳥"},{en:"friend",ja:"友達"},
  {en:"children",ja:"子どもたち"},
  {en:"station",ja:"駅"},{en:"train",ja:"電車"},{en:"spring",ja:"春"},
  {en:"park",ja:"公園"},{en:"room",ja:"部屋"},{en:"window",ja:"窓"},
  {en:"math",ja:"数学"},{en:"baseball",ja:"野球"},{en:"picture",ja:"絵"},
  {en:"school",ja:"学校"},
  {en:"girl",ja:"女の子"},{en:"car",ja:"車"},{en:"family",ja:"家族"},
  {en:"shoe",ja:"靴"},{en:"movie",ja:"映画"},{en:"textbook",ja:"教科書"},
  {en:"sister",ja:"姉妹"},{en:"mother",ja:"母"},{en:"fall",ja:"秋"},
  {en:"English",ja:"英語"},
  {en:"color",ja:"色"},{en:"buy",ja:"買う"},{en:"birthday",ja:"誕生日"},
  {en:"come",ja:"来る"},{en:"breakfast",ja:"朝食"},{en:"time",ja:"時間"},
  {en:"cry",ja:"泣く"},{en:"cut",ja:"切る"},{en:"begin",ja:"始める"},
  {en:"ask",ja:"聞く"},
  {en:"live",ja:"住む"},{en:"eat",ja:"食べる"},{en:"hear",ja:"聞こえる"},
  {en:"give",ja:"あげる"},{en:"find",ja:"見つける"},{en:"enjoy",ja:"楽しむ"},
  {en:"know",ja:"知っている"},{en:"need",ja:"必要とする"},{en:"have",ja:"持っている"},
  {en:"do",ja:"する"},
  {en:"help",ja:"助ける"},{en:"get",ja:"もらう"},{en:"month",ja:"月"},
  {en:"make",ja:"作る"},{en:"music",ja:"音楽"},{en:"like",ja:"好きだ"},
  {en:"listen",ja:"聞く"},{en:"call",ja:"呼ぶ"},{en:"meet",ja:"会う"},
  {en:"year",ja:"年"},
  {en:"sing",ja:"歌う"},{en:"read",ja:"読む"},{en:"teach",ja:"教える"},
  {en:"think",ja:"考える"},{en:"walk",ja:"歩く"},{en:"speak",ja:"話す"},
  {en:"run",ja:"走る"},{en:"study",ja:"勉強する"},{en:"see",ja:"見る"},
  {en:"stand",ja:"立つ"},
  {en:"beautiful",ja:"美しい"},{en:"Chinese",ja:"中国語"},{en:"write",ja:"書く"},
  {en:"watch",ja:"見る"},{en:"easy",ja:"簡単な"},{en:"famous",ja:"有名な"},
  {en:"favorite",ja:"お気に入り"},{en:"cloudy",ja:"曇り"},{en:"cute",ja:"かわいい"},
  {en:"work",ja:"働く"},
  {en:"wash",ja:"洗う"},{en:"use",ja:"使う"},{en:"put",ja:"置く"},
  {en:"take",ja:"取る"},{en:"talk",ja:"話す"},{en:"want",ja:"欲しい"},
  {en:"cold",ja:"寒い"},{en:"all",ja:"すべて"},{en:"every",ja:"毎"},
  {en:"delicious",ja:"おいしい"},
  {en:"large",ja:"大きい"},{en:"many",ja:"多くの"},{en:"high",ja:"高い"},
  {en:"old",ja:"古い"},{en:"Japanese",ja:"日本語"},{en:"new",ja:"新しい"},
  {en:"late",ja:"遅い"},{en:"next",ja:"次の"},{en:"popular",ja:"人気の"},
  {en:"only",ja:"だけ"},
  {en:"slow",ja:"遅い"},{en:"soft",ja:"柔らかい"},{en:"sad",ja:"悲しい"},
  {en:"tall",ja:"背が高い"},{en:"sick",ja:"病気"},{en:"tired",ja:"疲れた"},
  {en:"young",ja:"若い"},{en:"always",ja:"いつも"},{en:"sure",ja:"確か"},
  {en:"smart",ja:"賢い"},
  {en:"little",ja:"小さい"},{en:"long",ja:"長い"},{en:"hungry",ja:"お腹が空いた"},
  {en:"pretty",ja:"きれい"},{en:"short",ja:"短い"},{en:"also",ja:"また"},
  {en:"sunny",ja:"晴れ"},{en:"rainy",ja:"雨"},{en:"windy",ja:"風"},
  {en:"warm",ja:"暖かい"},
  {en:"today",ja:"今日"},{en:"together",ja:"一緒に"},{en:"here",ja:"ここ"},
  {en:"please",ja:"どうか"},{en:"there",ja:"そこ"},{en:"well",ja:"上手に"},
  {en:"yesterday",ja:"昨日"},{en:"tonight",ja:"今夜"}
];

const SETS = Array.from({length:13}, (_,i) => ({
  label:`No.${i+1}`,
  words: ALL_WORDS.slice(i*10, Math.min(i*10+10, ALL_WORDS.length))
}));

// ── State ──
let queue=[], current=0, currentStep=1;
let missedWords=[], spellCorrect=0, spellTotal=0;
let selectedSets=new Set();
let recognition=null;
let heardJp='', heardSp='';
let inputMode = {jp:'voice', sp:'voice'}; // 'voice' or 'type'

const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;

// ── モード切り替え ──
function setMode(target, mode){
  inputMode[target]=mode;
  // ボタンの見た目
  document.getElementById(`mode-${target}-voice`).classList.toggle('active', mode==='voice');
  document.getElementById(`mode-${target}-type`).classList.toggle('active', mode==='type');
  // UI表示切り替え
  document.getElementById(`${target}-voice-ui`).style.display= mode==='voice'?'block':'none';
  document.getElementById(`${target}-type-ui`).style.display= mode==='type'?'block':'none';
  // タイピングモードに切り替えたら入力欄を有効化
  const checkBtn=document.getElementById(`${target==='jp'?'jp':'sp'}-check-btn`);
  if(mode==='type'){
    checkBtn.disabled=false;
    const inputEl=document.getElementById(`${target}-input`);
    inputEl.value='';
    setTimeout(()=>inputEl.focus(),100);
  } else {
    checkBtn.disabled=true;
  }
  // 認識中なら止める
  if(recognition){recognition.abort();recognition=null;}
}

// ── Set selector ──
function buildSetGrid(){
  const grid=document.getElementById('set-grid');
  SETS.forEach((s,i)=>{
    const btn=document.createElement('button');
    btn.className='set-btn'; btn.id=`set-${i}`;
    btn.innerHTML=`${s.label}<span class="count">${s.words.length}語</span>`;
    btn.onclick=()=>toggleSet(i,btn);
    grid.appendChild(btn);
  });
}
function toggleSet(i,btn){
  if(selectedSets.has(i)){selectedSets.delete(i);btn.classList.remove('selected');}
  else{selectedSets.add(i);btn.classList.add('selected');}
  document.getElementById('start-btn').disabled=selectedSets.size===0;
}
function startSelected(){queue=[];selectedSets.forEach(i=>queue.push(...SETS[i].words));startQuiz();}
function startAll(){queue=[...ALL_WORDS];startQuiz();}
function startQuiz(){
  current=0;missedWords=[];spellCorrect=0;spellTotal=0;
  document.getElementById('set-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  loadWord();
}

// ── Load word ──
function loadWord(){
  document.getElementById('word-num').textContent=`単語 ${current+1}`;
  updateProgress();
  currentStep=1; updateSteps();

  show('step1'); hide('step2'); hide('step3');
  document.getElementById('step-next').style.display='none';

  const sb=document.getElementById('speak-btn');
  sb.classList.remove('playing');
  sb.querySelector('.label').textContent='TAP TO LISTEN';
  document.getElementById('next-to-step2').disabled=true;

  heardJp=''; heardSp='';
  resetMicUI('jp'); resetMicUI('sp');
  // モードUIリセット（音声モードに戻す）
  setMode('jp', inputMode.jp);
  setMode('sp', inputMode.sp);
  clearFeedbacks();
  setTimeout(()=>playAudio(),300);
}

function resetMicUI(m){
  const isJp=m==='jp';
  document.getElementById(`heard-${m}`).className='heard-text empty';
  document.getElementById(`heard-${m}`).textContent='ここに聞き取った言葉が表示されます';
  document.getElementById(`mic-status-${m}`).textContent=isJp?'タップして話す（日本語）':'タップして1文字ずつ言う';
  document.getElementById(`mic-status-${m}`).classList.remove('active');
  document.getElementById(`mic-${m}`).classList.remove('listening');
  // タイピング入力欄もリセット
  const inputEl=document.getElementById(`${m}-input`);
  if(inputEl){inputEl.value='';inputEl.className='answer-input';}
}

// ── TTS ──
function playAudio(){
  const utter=new SpeechSynthesisUtterance(queue[current].en);
  utter.lang='en-US'; utter.rate=0.85;
  const btn=document.getElementById('speak-btn');
  btn.classList.add('playing');
  btn.querySelector('.label').textContent='PLAYING...';
  utter.onend=()=>{
    btn.classList.remove('playing');
    btn.querySelector('.label').textContent='TAP TO LISTEN';
    document.getElementById('next-to-step2').disabled=false;
  };
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

function goStep2(){
  currentStep=2; updateSteps();
  hide('step1'); show('step2');
}

// ── Speech Recognition ──
function startListen(mode){
  if(!SpeechRec){alert('音声認識はChromeブラウザで使えます。');return;}
  if(recognition){recognition.abort();recognition=null;}

  recognition=new SpeechRec();
  recognition.lang=mode==='jp'?'ja-JP':'en-US';
  recognition.interimResults=true;
  recognition.maxAlternatives=5;
  recognition.continuous=false;

  const micBtn=document.getElementById(`mic-${mode}`);
  const statusEl=document.getElementById(`mic-status-${mode}`);
  const heardEl=document.getElementById(`heard-${mode}`);
  const checkId=mode==='jp'?'jp-check-btn':'sp-check-btn';

  micBtn.classList.add('listening');
  statusEl.textContent='🎤 聞いています…';
  statusEl.classList.add('active');
  heardEl.className='heard-text';
  heardEl.textContent='話してください…';
  document.getElementById(checkId).disabled=true;

  let finalResult='';

  recognition.onresult=(e)=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal)final+=t; else interim+=t;
    }
    finalResult=final||interim;
    heardEl.textContent=finalResult;
    if(final){
      if(mode==='jp') heardJp=final.trim();
      else heardSp=final.trim();
      document.getElementById(checkId).disabled=false;
    }
  };

  recognition.onerror=(e)=>{
    micBtn.classList.remove('listening');
    statusEl.classList.remove('active');
    statusEl.textContent=e.error==='no-speech'?'聞こえませんでした。もう一度':'エラー：もう一度タップ';
  };

  recognition.onend=()=>{
    micBtn.classList.remove('listening');
    statusEl.classList.remove('active');
    // if we captured something in interim only, still allow check
    if(finalResult && !heardJp && mode==='jp'){heardJp=finalResult.trim();document.getElementById(checkId).disabled=false;}
    if(finalResult && !heardSp && mode==='sp'){heardSp=finalResult.trim();document.getElementById(checkId).disabled=false;}
    statusEl.textContent=finalResult?'もう一度タップで再試行':'もう一度タップ';
  };

  recognition.start();
}

// ── Step 2: JP check (lenient — show answer, always advance) ──
function checkJp(){
  const word=queue[current];
  const fb=document.getElementById('jp-feedback');
  // タイピングモードの場合は入力値を取得
  if(inputMode.jp==='type'){
    const val=document.getElementById('jp-input').value.trim();
    if(!val)return;
    document.getElementById('jp-input').className='answer-input correct';
  } else {
    document.getElementById('heard-jp').className='heard-text correct';
  }
  fb.className='feedback show ok';
  fb.querySelector('.feedback-icon').textContent='✓';
  fb.querySelector('.feedback-text').innerHTML=
    `正解は <span class="correct-answer">${word.ja}</span>　確認できたら次へ！`;
  setTimeout(()=>goStep3(),1500);
}

function skipStep(mode){
  const word=queue[current];
  if(mode==='jp'){
    const fb=document.getElementById('jp-feedback');
    fb.className='feedback show ng';
    fb.querySelector('.feedback-icon').textContent='→';
    fb.querySelector('.feedback-text').innerHTML=`正解は <span class="correct-answer">${word.ja}</span>`;
    document.getElementById('heard-jp').className='heard-text wrong';
    document.getElementById('heard-jp').textContent='スキップ';
    setTimeout(()=>goStep3(),1200);
  } else {
    spellTotal++;
    missedWords.push(word);
    const fb=document.getElementById('sp-feedback');
    fb.className='feedback show ng';
    fb.querySelector('.feedback-icon').textContent='→';
    fb.querySelector('.feedback-text').innerHTML=`正解は <span class="correct-answer">${word.en}</span>`;
    document.getElementById('heard-sp').className='heard-text wrong';
    document.getElementById('heard-sp').textContent='スキップ';
    document.getElementById('step-next').style.display='block';
  }
}

function goStep3(){
  currentStep=3; updateSteps();
  const word=queue[current];
  hide('step2'); show('step3');
  document.getElementById('step3-label').innerHTML=
    `「<strong style="color:var(--accent3);font-size:20px;">${word.ja}</strong>」を1文字ずつスペルアウト！<br><small style="color:var(--muted);font-size:11px;">例: T・E・A・C・H・E・R</small>`;
}

// ── Step 3: Spell check ──
// スペルアウト対応: "T E A C H E R" や "ティー イー エー..." を正規化
function normalizeSpelled(str){
  // アルファベット1文字ずつ区切りをつなげる: "t e a c h e r" → "teacher"
  const joined = str.toLowerCase()
    .replace(/\b([a-z])\s+(?=[a-z]\b)/g, '$1') // "t e a" → "tea"
    .replace(/\s+/g,'')
    .replace(/[^a-z]/g,'');
  return joined;
}

function checkSpell(){
  const word=queue[current];
  const fb=document.getElementById('sp-feedback');
  const heardEl=document.getElementById('heard-sp');
  spellTotal++;

  let isOk=false;
  let displayAns='';

  if(inputMode.sp==='type'){
    // タイピングモード
    const val=document.getElementById('sp-input').value.trim();
    if(!val){spellTotal--;return;}
    displayAns=val;
    const ans=val.toLowerCase().replace(/[^a-z]/g,'');
    const correct=word.en.toLowerCase().replace(/[^a-z]/g,'');
    isOk=ans===correct;
    document.getElementById('sp-input').className='answer-input '+(isOk?'correct':'wrong');
  } else {
    // 音声モード
    const raw=heardSp.toLowerCase();
    const ans1=raw.replace(/[^a-z]/g,'');
    const ans2=normalizeSpelled(raw);
    const correct=word.en.toLowerCase().replace(/[^a-z]/g,'');
    isOk=ans1===correct || ans2===correct || editDist(ans1,correct)<=1 || editDist(ans2,correct)<=1;
    displayAns=heardSp;
    heardEl.className='heard-text '+(isOk?'correct':'wrong');
  }

  if(isOk){
    spellCorrect++;
    fb.className='feedback show ok';
    fb.querySelector('.feedback-icon').textContent='✓';
    fb.querySelector('.feedback-text').innerHTML=`<span class="correct-answer">${word.en}</span>　正解！`;
  } else {
    missedWords.push(word);
    fb.className='feedback show ng';
    fb.querySelector('.feedback-icon').textContent='✗';
    fb.querySelector('.feedback-text').innerHTML=
      `あなたの答え: <strong>${displayAns}</strong><br>正解は <span class="correct-answer">${word.en}</span>`;
  }
  document.getElementById('step-next').style.display='block';
}

// Levenshtein distance (tolerates 1 mishearing)
function editDist(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i||j));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function nextWord(){
  if(recognition){recognition.abort();recognition=null;}
  current++;
  if(current>=queue.length){showResult();}
  else{
    const card=document.getElementById('quiz-card');
    card.classList.remove('fade-in'); void card.offsetWidth; card.classList.add('fade-in');
    loadWord();
  }
}

// ── Result ──
function showResult(){
  hide('quiz-screen');
  document.getElementById('result-screen').style.display='block';
  document.getElementById('result-score').textContent=`${spellCorrect}/${spellTotal}`;

  const seen=new Set();
  const unique=missedWords.filter(w=>{if(seen.has(w.en))return false;seen.add(w.en);return true;});

  if(unique.length>0){
    document.getElementById('missed-list').style.display='block';
    document.getElementById('missed-items').innerHTML=
      unique.map(w=>`<div class="missed-item"><span class="missed-en">${w.en}</span><span class="missed-ja">${w.ja}</span></div>`).join('');
    document.getElementById('retry-btn').disabled=false;
  } else {
    document.getElementById('missed-list').style.display='none';
    document.getElementById('retry-btn').disabled=true;
  }
}

function retryMissed(){
  const seen=new Set();
  queue=missedWords.filter(w=>{if(seen.has(w.en))return false;seen.add(w.en);return true;});
  current=0; missedWords=[]; spellCorrect=0; spellTotal=0;
  document.getElementById('result-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  loadWord();
}

function backToMenu(){
  document.getElementById('result-screen').style.display='none';
  document.getElementById('set-screen').style.display='block';
}

// ── Helpers ──
function show(id){document.getElementById(id).style.display='block';}
function hide(id){document.getElementById(id).style.display='none';}
function updateProgress(){
  const total=queue.length, pct=total>0?(current/total*100):0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-info').textContent=`${current+1} / ${total}`;
}
function updateSteps(){
  [1,2,3].forEach(n=>{
    document.getElementById(`s${n}`).className='step'+(n===currentStep?' active':n<currentStep?' done':'');
  });
}
function clearFeedbacks(){
  ['jp-feedback','sp-feedback'].forEach(id=>{document.getElementById(id).className='feedback';});
}

buildSetGrid();
</script>
